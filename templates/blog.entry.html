<!doctype html>
<html lang="en">
  <head>
    {{> head }}
  </head>
  <body>
    <main>
      <article>{{{ body }}}</article>
      <p>
        {{#each tags}}<a href="{{ site.baseUrl }}/blog/tags/{{ this }}/"
          >#{{ this }}</a
        >
        {{/each}}
      </p>
      <nav aria-label="Post navigation">
        {{#if prev}}<a rel="prev" href="{{ prev.url }}"
          >← Previous: {{ prev.title }}</a
        >{{/if}} {{#if next}}<a rel="next" href="{{ next.url }}"
          >Next: {{ next.title }} →</a
        >{{/if}}
      </nav>
    </main>
  </body>
</html>
