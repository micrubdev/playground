<!doctype html>
<html lang="en">
  <head>
    {{> head }}
  </head>
  <body>
    <main>
      <article>{{{ body }}}</article>
      <p>
        {{#each tags}}<a href="{{ site.baseUrl }}/blog/tags/{{ this }}/"
          >#{{ this }}</a
        >
        {{/each}}
      </p>
      <nav>
        {{#if prev}}<a href="{{ prev.url }}">← {{ prev.title }}</a>{{/if}} {{#if
        next}}<a href="{{ next.url }}">{{ next.title }} →</a>{{/if}}
      </nav>
    </main>
  </body>
</html>
